bundle:
  name: Ecom_ETL
  uuid: 45bfe6eb-1ac9-4fd5-95a9-43c8d57a3efd

include:
  - resources/*.yml
  - resources/*/*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: dbc-0d8798f7-6682.cloud.databricks.com
    presets:
      name_prefix: ${workspace.current_user.short_name}
      source_linked_deployment: false
    permissions:
      - group_name: admins
        level: CAN_MANAGE
      - user_name: srivastava.ashwani886@gmail.com
        level: CAN_MANAGE
    variables:
      catalog: ecom
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: dbc-0d8798f7-6682.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/srivastava.ashwani886@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/srivastava.ashwani886@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ecom
      schema: prod
    permissions:
      - group_name: admins
        level: CAN_MANAGE
